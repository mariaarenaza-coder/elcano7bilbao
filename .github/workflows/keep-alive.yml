          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://omqepmgfrpndpquluwrf.supabase.co/rest/v1/" \
            -H "apikey: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9tcWVwbWdmcnBuZHBxdWx1d3JmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyOTM0OTAsImV4cCI6MjA5Mjg2OTQ5MH0.84baW73o1UupBfnnMrN22vwb_6nw_skhHNplRqr9BAU")
